<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AudioScribe AI Convertor</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM (React 18) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel (JSX'i tarayıcıda derlemek için) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <!-- React uygulamasının yükleneceği div -->
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- İkon Bileşenleri (lucide-react yerine bağımsız SVG ikonları) ---
    const Upload = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>;
    const FileText = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>;
    const Play = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>;
    const Download = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;
    const Loader2 = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></svg>;
    const Mic = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>;
    const AlertCircle = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
    const Clock = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
    const Copy = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>;
    const Check = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;

    const App = () => {
      const [file, setFile] = useState(null);
      const [isProcessing, setIsProcessing] = useState(false);
      const [transcript, setTranscript] = useState("");
      const [error, setError] = useState(null);
      const [copied, setCopied] = useState(false);
      const fileInputRef = useRef(null);

      // Gemini API Configuration
      const apiKey = "AIzaSyCSWFFnVkTLDbJYjpNOgInPFynh35Uv0ho"; // Lütfen kendi API anahtarınızı kullanın
      const modelName = "gemini-2.5-flash";

      const handleFileChange = (e) => {
        const selectedFile = e.target.files[0];
        if (selectedFile) {
          if (selectedFile.size > 100 * 1024 * 1024) {
            setError("Dosya boyutu çok büyük (Maksimum 100MB).");
            return;
          }
          setFile(selectedFile);
          setError(null);
          setTranscript("");
          setCopied(false);
        }
      };

      const triggerFileInput = () => {
        if (fileInputRef.current) {
          fileInputRef.current.click();
        }
      };

      const fileToBase64 = (file) => {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.readAsDataURL(file);
          reader.onload = () => resolve(reader.result.split(',')[1]);
          reader.onerror = (error) => reject(error);
        });
      };

      const processAudio = async () => {
        if (!file) return;

        setIsProcessing(true);
        setError(null);
        setTranscript("");

        try {
          const base64Data = await fileToBase64(file);
          
          const systemPrompt = `Sen profesyonel bir ses deşifre uzmanısın. 
          Sana verilen ses dosyasını detaylı analiz et ve şu kurallara göre metne dönüştür:
          1. Bütün metni tek bir zaman damgasına ([00:00]) sıkıştırma. Konuşmanın akışına göre, her cümlenin veya her 5-10 saniyelik bloğun başına doğru olan gerçek zaman damgasını ([DAKİKA:SANİYE] formatında) ekle.
          2. Konuşmacıları belirle (Örn: Erkek Konuşmacı, Kadın Konuşmacı).
          3. Cümle başlarken kelime büyük harfle başlasın. imla kurallarına dikkat et. gerekirse imla işaretlerinide kullan.
		  4. Çıktı şu formatta ilerlesin:
          [00:00] Erkek Konuşmacı: sesDenemeSesDeneme
          [00:05] Erkek Konuşmacı: testDenemeTest`;

          const userQuery = "Lütfen bu ses dosyasını deşifre et, konuşmacıları ayır, gerçek zaman damgalarını ekle ve sadece söylenenleri düzgün bir şekilde camelCase olarak yaz.";

          let retries = 0;
          let success = false;
          let resultText = "";

          while (retries < 5 && !success) {
            try {
              const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{
                    parts: [
                      { text: userQuery },
                      { inlineData: { mimeType: file.type || "audio/m4a", data: base64Data } }
                    ]
                  }],
                  systemInstruction: { parts: [{ text: systemPrompt }] }
                })
              });

              if (!response.ok) throw new Error('API hatası');
              
              const data = await response.json();
              resultText = data.candidates?.[0]?.content?.parts?.[0]?.text;
              if (resultText) {
                success = true;
              } else {
                throw new Error('Yanıt alınamadı');
              }
            } catch (e) {
              retries++;
              const delay = Math.pow(2, retries) * 1000;
              await new Promise(res => setTimeout(res, delay));
            }
          }

          if (success) {
            setTranscript(resultText);
          } else {
            setError("Ses işlenirken bir hata oluştu. Lütfen tekrar deneyin.");
          }
        } catch (err) {
          setError("Hata: " + err.message);
        } finally {
          setIsProcessing(false);
        }
      };

      const copyToClipboard = () => {
        if (!transcript) return;
        const textArea = document.createElement("textarea");
        textArea.value = transcript;
        document.body.appendChild(textArea);
        textArea.select();
        try {
          document.execCommand('copy');
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        } catch (err) {
          setError("Kopyalama başarısız oldu.");
        }
        document.body.removeChild(textArea);
      };

      const downloadTranscript = () => {
        if (!transcript || !file) return;
        
        try {
          const fileName = file.name ? file.name.split('.')[0] : 'desifre';
          const fileContent = `SES DEŞİFRE DÖKÜMANI\nDosya: ${file.name}\nTarih: ${new Date().toLocaleString('tr-TR')}\n\n${transcript}`;
          const blob = new Blob([fileContent], { type: 'text/plain;charset=utf-8' });
          const url = URL.createObjectURL(blob);
          
          const link = document.createElement("a");
          link.href = url;
          link.setAttribute("download", `${fileName}_desifre.txt`);
          document.body.appendChild(link);
          link.click();
          
          // Cleanup
          setTimeout(() => {
            document.body.removeChild(link);
            window.URL.revokeObjectURL(url);
          }, 100);
        } catch (err) {
          setError("Dosya indirme sırasında bir hata oluştu. Lütfen kopyala butonunu kullanın.");
        }
      };

      return (
        <div className="min-h-screen bg-slate-50 text-slate-900 font-sans p-4 md:p-8">
          <div className="max-w-4xl mx-auto">
            <header className="mb-8 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="bg-indigo-600 p-2 rounded-xl shadow-lg shadow-indigo-200">
                  <Mic className="text-white w-6 h-6" />
                </div>
                <div>
                  <h1 className="text-2xl font-bold tracking-tight">AudioScribe AI</h1>
                  <p className="text-slate-500 text-sm italic">Konuşmacıları ayıran akıllı deşifre</p>
                </div>
              </div>
            </header>

            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
              <div className="md:col-span-1 space-y-6">
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                  <h2 className="text-lg font-semibold mb-4 flex items-center gap-2">
                    <Upload className="w-5 h-5 text-indigo-500" />
                    Dosya Yükle
                  </h2>
                  
                  <div 
                    onClick={triggerFileInput}
                    className={`
                      relative border-2 border-dashed rounded-xl p-8 text-center transition-all cursor-pointer
                      ${file ? 'border-indigo-400 bg-indigo-50' : 'border-slate-300 hover:border-indigo-300 hover:bg-slate-50'}
                    `}
                  >
                    <input 
                      type="file" 
                      ref={fileInputRef}
                      accept="audio/*,.m4a,.mp3,.wav,.ogg" 
                      onChange={handleFileChange}
                      className="hidden"
                    />
                    
                    <div className="mx-auto w-12 h-12 bg-slate-100 rounded-full flex items-center justify-center mb-3">
                      <FileText className={`w-6 h-6 ${file ? 'text-indigo-500' : 'text-slate-400'}`} />
                    </div>
                    <p className="text-sm font-medium text-slate-700 break-all">
                      {file ? file.name : 'Ses dosyasını seçmek için tıkla'}
                    </p>
                    <p className="text-xs text-slate-400 mt-1">.m4a, .mp3, .wav desteklenir</p>
                  </div>

                  <button
                    onClick={processAudio}
                    disabled={!file || isProcessing}
                    className={`
                      w-full mt-6 py-3 px-4 rounded-xl font-semibold flex items-center justify-center gap-2 transition-all
                      ${!file || isProcessing 
                        ? 'bg-slate-100 text-slate-400 cursor-not-allowed' 
                        : 'bg-indigo-600 text-white hover:bg-indigo-700 shadow-lg shadow-indigo-100'}
                    `}
                  >
                    {isProcessing ? (
                      <React.Fragment>
                        <Loader2 className="w-5 h-5 animate-spin" />
                        İşleniyor...
                      </React.Fragment>
                    ) : (
                      <React.Fragment>
                        <Play className="w-5 h-5 fill-current" />
                        Metne Dönüştür
                      </React.Fragment>
                    )}
                  </button>
                </div>

                {error && (
                  <div className="bg-red-50 border border-red-100 text-red-600 p-4 rounded-xl flex items-start gap-3 animate-in fade-in duration-300">
                    <AlertCircle className="w-5 h-5 shrink-0 mt-0.5" />
                    <p className="text-sm font-medium">{error}</p>
                  </div>
                )}
              </div>

              <div className="md:col-span-2">
                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 h-full flex flex-col min-h-[500px]">
                  <div className="p-6 border-b border-slate-100 flex flex-wrap items-center justify-between gap-4">
                    <div className="flex items-center gap-2">
                      <FileText className="w-5 h-5 text-indigo-500" />
                      <h2 className="text-lg font-semibold">Çıktı Dökümanı</h2>
                    </div>
                    {transcript && (
                      <div className="flex gap-2">
                        <button 
                          onClick={copyToClipboard}
                          className={`p-2 rounded-lg transition-all flex items-center gap-2 text-sm font-bold border ${copied ? 'bg-emerald-50 text-emerald-600 border-emerald-200' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'}`}
                        >
                          {copied ? <Check className="w-4 h-4" /> : <Copy className="w-4 h-4" />}
                          {copied ? 'KOPYALANDI' : 'KOPYALA'}
                        </button>
                        <button 
                          onClick={downloadTranscript}
                          className="p-2 bg-indigo-600 hover:bg-indigo-700 rounded-lg transition-colors text-white flex items-center gap-2 text-sm font-bold shadow-sm"
                        >
                          <Download className="w-4 h-4" />
                          İNDİR (.txt)
                        </button>
                      </div>
                    )}
                  </div>

                  <div className="p-6 flex-grow overflow-y-auto max-h-[600px] bg-slate-50/20">
                    {isProcessing ? (
                      <div className="flex flex-col items-center justify-center h-full py-20 text-slate-400">
                        <div className="relative mb-6">
                          <div className="absolute inset-0 bg-indigo-500/20 blur-xl rounded-full animate-pulse"></div>
                          <Loader2 className="w-16 h-16 animate-spin text-indigo-600 relative z-10" />
                        </div>
                        <p className="text-slate-600 font-medium animate-pulse">Konuşmalar deşifre ediliyor...</p>
                      </div>
                    ) : transcript ? (
                      <div className="prose prose-indigo max-w-none whitespace-pre-wrap">
                        {transcript.split('\n').map((line, i) => {
                          if (!line.trim()) return <br key={i} />;
                          
                          const hasTimestamp = line.match(/\[\d+:\d+\]/);
                          return (
                            <div key={i} className={`mb-4 ${hasTimestamp ? 'border-l-4 border-indigo-100 pl-4 py-1' : ''}`}>
                              {line.split(/(\[\d+:\d+\])/).map((part, j) => {
                                if (part.match(/\[\d+:\d+\]/)) {
                                  return (
                                    <span key={j} className="inline-flex items-center gap-1 bg-indigo-50 text-indigo-700 px-2 py-0.5 rounded text-[10px] font-black mr-2 uppercase tracking-tighter align-middle">
                                      <Clock className="w-3 h-3" />
                                      {part}
                                    </span>
                                  );
                                }
                                if (part.toLowerCase().includes("karakter") || part.toLowerCase().includes("konuşmacı")) {
                                    return <span key={j} className="font-bold text-indigo-900 block mb-1 text-sm uppercase tracking-wide">{part}</span>;
                                }
                                return <span key={j} className="text-slate-700 leading-relaxed text-sm">{part}</span>;
                              })}
                            </div>
                          );
                        })}
                      </div>
                    ) : (
                      <div className="flex flex-col items-center justify-center h-full py-20 text-slate-400">
                        <div className="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mb-6 border border-slate-100 shadow-inner">
                          <Mic className="w-10 h-10 text-slate-200" />
                        </div>
                        <p className="font-medium text-slate-500">Analiz sonucu burada görünecek.</p>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // React'i render et
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
